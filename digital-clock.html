<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 3em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        .local-time-section {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .local-time-section h2 {
            color: #4fc3f7;
            font-size: 1.3em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .time-display {
            font-size: 4em;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .date-display {
            font-size: 1.2em;
            color: #81d4fa;
            text-shadow: 0 0 10px rgba(129, 212, 250, 0.4);
        }

        .timezone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .timezone-card {
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.1), rgba(156, 39, 176, 0.1));
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .timezone-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #b3e5fc);
            transform: scaleX(0);
            transform-origin: left;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            to {
                transform: scaleX(1);
            }
        }

        .timezone-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(79, 195, 247, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .timezone-name {
            font-size: 1.2em;
            color: #4fc3f7;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-time {
            font-size: 2.5em;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
        }

        .timezone-date {
            font-size: 0.9em;
            color: #b3e5fc;
            margin-bottom: 10px;
        }

        .timezone-utc {
            font-size: 0.85em;
            color: #81d4fa;
            opacity: 0.8;
        }

        .timezone-offset {
            display: inline-block;
            background: rgba(79, 195, 247, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #b3e5fc;
            border: 1px solid rgba(79, 195, 247, 0.4);
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        .timezone-select {
            padding: 10px 15px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(79, 195, 247, 0.5);
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            backdrop-filter: blur(10px);
        }

        .timezone-select option {
            background: #1e3c72;
            color: white;
        }

        .timezone-select:hover {
            border-color: rgba(79, 195, 247, 0.8);
        }

        .info-section {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            font-size: 0.9em;
        }

        .clock-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .time-display {
                font-size: 2.5em;
            }

            .timezone-time {
                font-size: 1.8em;
            }

            .timezone-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <h1>🌍 Global Time Clock</h1>

        <div class="local-time-section">
            <h2>Your Local Time</h2>
            <div class="time-display" id="localTime">00:00:00</div>
            <div class="date-display" id="localDate">Loading...</div>
        </div>

        <div>
            <label for="timezoneSelect" style="color: white; margin-right: 10px; font-size: 1.1em;">Add Custom Timezone:</label>
            <select id="timezoneSelect" class="timezone-select">
                <option value="">Select a timezone...</option>
            </select>
            <button onclick="addCustomTimezone()">Add Timezone</button>
            <button onclick="resetClocks()" style="background: linear-gradient(135deg, #f44336, #e53935);">Reset All</button>
        </div>

        <div class="timezone-grid" id="timezoneGrid">
            <!-- Timezone clocks will be added here -->
        </div>

        <div class="info-section">
            <p>💡 Click "Add Timezone" to add more clocks. Clocks update every second automatically.</p>
        </div>
    </div>

    <script>
        // Default timezones to display
        const defaultTimezones = [
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'Singapore', timezone: 'Asia/Singapore' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong' },
            { name: 'Mumbai', timezone: 'Asia/Kolkata' },
            { name: 'Paris', timezone: 'Europe/Paris' },
            { name: 'Los Angeles', timezone: 'America/Los_Angeles' },
            { name: 'São Paulo', timezone: 'America/Sao_Paulo' },
            { name: 'Bangkok', timezone: 'Asia/Bangkok' }
        ];

        // All available timezones
        const allTimezones = [
            'UTC', 'America/New_York', 'America/Los_Angeles', 'America/Denver', 'America/Chicago',
            'America/Toronto', 'America/Mexico_City', 'America/Sao_Paulo', 'America/Buenos_Aires',
            'America/Anchorage', 'Pacific/Honolulu', 'Europe/London', 'Europe/Paris', 'Europe/Berlin',
            'Europe/Madrid', 'Europe/Rome', 'Europe/Amsterdam', 'Europe/Istanbul', 'Europe/Moscow',
            'Asia/Dubai', 'Asia/Kolkata', 'Asia/Bangkok', 'Asia/Hong_Kong', 'Asia/Shanghai',
            'Asia/Singapore', 'Asia/Tokyo', 'Asia/Seoul', 'Australia/Sydney', 'Australia/Melbourne',
            'Australia/Brisbane', 'Pacific/Auckland', 'Pacific/Fiji', 'Africa/Cairo', 'Africa/Johannesburg',
            'Africa/Lagos', 'Africa/Nairobi', 'Asia/Jakarta', 'Asia/Manila', 'Asia/Kuala_Lumpur'
        ];

        let customTimezones = [...defaultTimezones];

        // Initialize timezone select dropdown
        function initializeTimezoneSelect() {
            const select = document.getElementById('timezoneSelect');
            select.innerHTML = '<option value="">Select a timezone...</option>';
            
            allTimezones.forEach(tz => {
                const option = document.createElement('option');
                option.value = tz;
                option.textContent = tz.replace(/_/g, ' ');
                select.appendChild(option);
            });
        }

        // Format time with leading zeros
        function formatTime(date) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        // Format date
        function formatDate(date) {
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        // Get time in specific timezone
        function getTimeInTimezone(timezone) {
            try {
                const now = new Date();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: timezone,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                const parts = formatter.formatToParts(now);
                const timeParts = {};
                
                parts.forEach(part => {
                    timeParts[part.type] = part.value;
                });

                const tzDate = new Date(
                    `${timeParts.year}-${timeParts.month}-${timeParts.day}T${timeParts.hour}:${timeParts.minute}:${timeParts.second}`
                );

                return {
                    date: tzDate,
                    time: `${timeParts.hour}:${timeParts.minute}:${timeParts.second}`,
                    date_str: `${timeParts.month}/${timeParts.day}/${timeParts.year}`
                };
            } catch (e) {
                console.error(`Invalid timezone: ${timezone}`, e);
                return null;
            }
        }

        // Calculate UTC offset
        function getUTCOffset(timezone) {
            try {
                const now = new Date();
                const utc = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
                const tz = new Date(now.toLocaleString('en-US', { timeZone: timezone }));
                
                const offset = (tz - utc) / (1000 * 60 * 60);
                const sign = offset >= 0 ? '+' : '';
                const hours = Math.floor(Math.abs(offset));
                const minutes = Math.round((Math.abs(offset) - hours) * 60);
                
                return `UTC ${sign}${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            } catch (e) {
                return 'UTC';
            }
        }

        // Create timezone card element
        function createTimezoneCard(name, timezone) {
            const card = document.createElement('div');
            card.className = 'timezone-card';
            card.id = `card-${timezone}`;
            
            card.innerHTML = `
                <div class="clock-icon">🕐</div>
                <div class="timezone-name">${name}</div>
                <div class="timezone-time" data-timezone="${timezone}">00:00:00</div>
                <div class="timezone-date" data-timezone="${timezone}">--/--/----</div>
                <div class="timezone-utc" data-timezone="${timezone}">UTC</div>
                <div class="timezone-offset">
                    <button onclick="removeTimezone('${timezone}')" style="
                        padding: 5px 12px;
                        font-size: 0.8em;
                        background: rgba(244, 67, 54, 0.6);
                        margin: 0;
                        box-shadow: none;
                    ">Remove</button>
                </div>
            `;
            
            return card;
        }

        // Update all clock displays
        function updateClocks() {
            // Update local time
            const now = new Date();
            document.getElementById('localTime').textContent = formatTime(now);
            document.getElementById('localDate').textContent = formatDate(now);

            // Update timezone clocks
            customTimezones.forEach(tz => {
                const timeData = getTimeInTimezone(tz.timezone);
                if (timeData) {
                    const timeElements = document.querySelectorAll(`[data-timezone="${tz.timezone}"]`);
                    timeElements.forEach(el => {
                        if (el.className.includes('timezone-time')) {
                            el.textContent = timeData.time;
                        } else if (el.className.includes('timezone-date')) {
                            el.textContent = timeData.date_str;
                        } else if (el.className.includes('timezone-utc')) {
                            el.textContent = getUTCOffset(tz.timezone);
                        }
                    });
                }
            });
        }

        // Render timezone clocks
        function renderClocks() {
            const grid = document.getElementById('timezoneGrid');
            grid.innerHTML = '';
            
            customTimezones.forEach(tz => {
                grid.appendChild(createTimezoneCard(tz.name, tz.timezone));
            });
            
            updateClocks();
        }

        // Add custom timezone
        function addCustomTimezone() {
            const select = document.getElementById('timezoneSelect');
            const timezone = select.value;

            if (!timezone) {
                alert('Please select a timezone');
                return;
            }

            // Check if timezone already exists
            if (customTimezones.some(tz => tz.timezone === timezone)) {
                alert('This timezone is already added!');
                return;
            }

            const name = timezone.replace(/_/g, ' ');
            customTimezones.push({ name, timezone });
            
            select.value = '';
            renderClocks();
        }

        // Remove timezone
        function removeTimezone(timezone) {
            customTimezones = customTimezones.filter(tz => tz.timezone !== timezone);
            renderClocks();
        }

        // Reset to default timezones
        function resetClocks() {
            if (confirm('Reset to default timezones?')) {
                customTimezones = [...defaultTimezones];
                renderClocks();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeTimezoneSelect();
            renderClocks();
            
            // Update every second
            setInterval(updateClocks, 1000);
        });
    </script>
</body>
</html>
