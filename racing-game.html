<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            border: 5px solid #333;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            z-index: 10;
        }

        .hud div {
            margin: 5px 0;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 100;
            display: none;
            color: white;
        }

        .game-over-screen h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .game-over-screen p {
            font-size: 1.3em;
            margin-bottom: 30px;
        }

        .game-over-screen button {
            padding: 15px 30px;
            font-size: 1.1em;
            background: #4fc3f7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .game-over-screen button:hover {
            background: #29b6f6;
        }

        .instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="hud">
            <div>Speed: <span id="speed">0</span></div>
            <div class="score">Score: <span id="score">0</span></div>
        </div>

        <div class="game-over-screen" id="gameOverScreen">
            <h1>GAME OVER!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="location.reload()">Play Again</button>
        </div>

        <div class="instructions">
            ← → Arrow Keys to Move | SPACE to Start
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let speed = 5;

        // Player car
        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 80,
            width: 40,
            height: 60,
            speed: 0,
            maxSpeed: 8
        };

        // Enemy cars array
        let enemies = [];
        let enemySpawnRate = 0;

        // Keys pressed
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.code === 'Space' && !gameStarted && !gameOver) {
                gameStarted = true;
            }

            if (e.code === 'Space' && gameOver) {
                location.reload();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Draw road
        function drawRoad() {
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Road
            ctx.fillStyle = '#444';
            ctx.fillRect(50, 0, 300, canvas.height);

            // Road lines
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 20]);

            for (let i = -speed; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, i);
                ctx.lineTo(canvas.width / 2, i + 40);
                ctx.stroke();
            }

            ctx.setLineDash([]);
        }

        // Draw player car
        function drawPlayer() {
            // Car body
            ctx.fillStyle = '#FF1744';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Car windows
            ctx.fillStyle = '#4fc3f7';
            ctx.fillRect(player.x + 5, player.y + 10, 30, 20);

            // Car wheels
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 5, player.y - 5, 8, 8);
            ctx.fillRect(player.x + 27, player.y - 5, 8, 8);
            ctx.fillRect(player.x + 5, player.y + player.height - 3, 8, 8);
            ctx.fillRect(player.x + 27, player.y + player.height - 3, 8, 8);
        }

        // Draw enemy car
        function drawEnemy(enemy) {
            // Car body
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

            // Car windows
            ctx.fillStyle = '#4fc3f7';
            ctx.fillRect(enemy.x + 5, enemy.y + 10, 30, 20);

            // Car wheels
            ctx.fillStyle = '#000';
            ctx.fillRect(enemy.x + 5, enemy.y - 5, 8, 8);
            ctx.fillRect(enemy.x + 27, enemy.y - 5, 8, 8);
            ctx.fillRect(enemy.x + 5, enemy.y + enemy.height - 3, 8, 8);
            ctx.fillRect(enemy.x + 27, enemy.y + enemy.height - 3, 8, 8);
        }

        // Update player
        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 60) {
                player.x -= 8;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - 100) {
                player.x += 8;
            }

            if (gameStarted) {
                player.speed = Math.min(player.speed + 0.1, player.maxSpeed);
            }
        }

        // Spawn enemies
        function spawnEnemy() {
            const lanes = [80, 180, 280];
            const randomLane = lanes[Math.floor(Math.random() * lanes.length)];

            enemies.push({
                x: randomLane,
                y: -60,
                width: 40,
                height: 60,
                speed: 3 + Math.random() * 2
            });
        }

        // Update enemies
        function updateEnemies() {
            enemySpawnRate++;
            if (enemySpawnRate > Math.max(40 - score / 50, 20)) {
                spawnEnemy();
                enemySpawnRate = 0;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed + speed * 0.3;

                // Check collision
                if (checkCollision(player, enemies[i])) {
                    gameOver = true;
                    showGameOver();
                }

                // Remove off-screen enemies
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    speed = Math.min(speed + 0.1, 12);
                }
            }
        }

        // Collision detection
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Show game over
        function showGameOver() {
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        // Update HUD
        function updateHUD() {
            document.getElementById('speed').textContent = Math.round(speed * 5);
            document.getElementById('score').textContent = score;
        }

        // Game loop
        function gameLoop() {
            // Clear canvas
            drawRoad();

            if (gameStarted && !gameOver) {
                updatePlayer();
                updateEnemies();
            }

            drawPlayer();
            enemies.forEach(drawEnemy);
            updateHUD();

            if (!gameStarted && !gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Press SPACE to Start', canvas.width / 2, canvas.height / 2);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
