<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .status {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #333;
            height: 30px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            margin: 30px auto;
            background: #667eea;
            padding: 5px;
            border-radius: 8px;
            width: fit-content;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: white;
            border: none;
            border-radius: 5px;
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cell:hover {
            background: #f0f0f0;
            transform: scale(0.98);
        }

        .cell.x {
            color: #667eea;
        }

        .cell.o {
            color: #764ba2;
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        .scores {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            gap: 20px;
        }

        .score-box {
            background: #f0f0f0;
            padding: 15px 25px;
            border-radius: 8px;
            flex: 1;
        }

        .score-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .score-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .info {
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>
        
        <div class="status" id="status">You are X, Computer is O</div>

        <div class="scores">
            <div class="score-box">
                <div class="score-label">Your Wins</div>
                <div class="score-number" id="playerScore">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Computer Wins</div>
                <div class="score-number" id="computerScore">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Draws</div>
                <div class="score-number" id="drawScore">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <button class="cell" onclick="makeMove(0)"></button>
            <button class="cell" onclick="makeMove(1)"></button>
            <button class="cell" onclick="makeMove(2)"></button>
            <button class="cell" onclick="makeMove(3)"></button>
            <button class="cell" onclick="makeMove(4)"></button>
            <button class="cell" onclick="makeMove(5)"></button>
            <button class="cell" onclick="makeMove(6)"></button>
            <button class="cell" onclick="makeMove(7)"></button>
            <button class="cell" onclick="makeMove(8)"></button>
        </div>

        <div class="controls">
            <button onclick="resetGame()">New Game</button>
            <button onclick="resetScores()">Reset Scores</button>
        </div>

        <div class="info">
            <p>Click on any cell to make your move. Computer will play automatically.</p>
        </div>
    </div>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let gameActive = true;
        let playerWins = 0;
        let computerWins = 0;
        let draws = 0;

        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        function makeMove(index) {
            if (board[index] !== '' || !gameActive) return;

            board[index] = 'X';
            updateBoard();

            if (checkWinner('X')) {
                document.getElementById('status').textContent = '🎉 You Won!';
                playerWins++;
                document.getElementById('playerScore').textContent = playerWins;
                gameActive = false;
                return;
            }

            if (board.every(cell => cell !== '')) {
                document.getElementById('status').textContent = '🤝 Draw!';
                draws++;
                document.getElementById('drawScore').textContent = draws;
                gameActive = false;
                return;
            }

            setTimeout(computerMove, 500);
        }

        function computerMove() {
            let bestScore = -Infinity;
            let bestMove = -1;

            for (let i = 0; i < board.length; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    let score = minimax(0, false);
                    board[i] = '';

                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = i;
                    }
                }
            }

            if (bestMove === -1) {
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        bestMove = i;
                        break;
                    }
                }
            }

            board[bestMove] = 'O';
            updateBoard();

            if (checkWinner('O')) {
                document.getElementById('status').textContent = '😢 Computer Won!';
                computerWins++;
                document.getElementById('computerScore').textContent = computerWins;
                gameActive = false;
                return;
            }

            if (board.every(cell => cell !== '')) {
                document.getElementById('status').textContent = '🤝 Draw!';
                draws++;
                document.getElementById('drawScore').textContent = draws;
                gameActive = false;
                return;
            }
        }

        function minimax(depth, isMaximizing) {
            if (checkWinner('O')) return 10 - depth;
            if (checkWinner('X')) return depth - 10;
            if (board.every(cell => cell !== '')) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = minimax(depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < board.length; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        let score = minimax(depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinner(player) {
            return winningConditions.some(condition =>
                condition.every(index => board[index] === player)
            );
        }

        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                cell.textContent = board[index];
                cell.className = 'cell';
                if (board[index] === 'X') {
                    cell.classList.add('x');
                } else if (board[index] === 'O') {
                    cell.classList.add('o');
                }
            });
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            document.getElementById('status').textContent = 'Your turn (X)';
            updateBoard();
        }

        function resetScores() {
            if (confirm('Reset all scores?')) {
                playerWins = 0;
                computerWins = 0;
                draws = 0;
                document.getElementById('playerScore').textContent = '0';
                document.getElementById('computerScore').textContent = '0';
                document.getElementById('drawScore').textContent = '0';
                resetGame();
            }
        }

        updateBoard();
    </script>
</body>
</html>
